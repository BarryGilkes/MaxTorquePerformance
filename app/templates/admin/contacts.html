{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <h1>Contact Submissions</h1>
    <table class="table">
        <thead><tr><th>Name</th><th>Email</th><th>Message</th><th>Date</th></tr></thead>
        <tbody>
        {% for c in contacts %}
        <tr><td>{{ c.name }}</td><td>{{ c.email }}</td><td>{{ c.message[:50] }}...</td><td>{{ c.created_at.strftime('%Y-%m-%d') }}</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
