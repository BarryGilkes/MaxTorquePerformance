{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Create' }} Product{% endblock %}
{% block content %}
<div class="container py-5">
    <h1>{{ 'Edit' if product else 'Create' }} Product</h1>
    <form method="POST">
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">SKU *</label>
                    <input type="text" name="sku" class="form-control" required value="{{ product.sku if product else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Product Name *</label>
                    <input type="text" name="name" class="form-control" required value="{{ product.name if product else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Brand</label>
                    <input type="text" name="brand" class="form-control" value="{{ product.brand if product else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category_id" class="form-select">
                        <option value="">— No Category —</option>
                        {% for c in categories %}
                        <option value="{{ c.id }}" {{ 'selected' if product and product.category_id == c.id else '' }}>{{ c.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Turn14 Item ID</label>
                    <input type="text" name="turn14_item_id" class="form-control" value="{{ product.turn14_item_id if product else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Turn14 Price</label>
                    <input type="number" step="0.01" name="turn14_price" class="form-control" value="{{ product.turn14_price if product and product.turn14_price else '' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Markup %</label>
                    <input type="number" step="0.01" name="markup_percent" class="form-control" value="{{ product.markup_percent if product else 0 }}">
                    <small class="text-muted">Display price = Turn14 Price × (1 + markup%)</small>
                </div>
                <div class="mb-3">
                    <label class="form-label">Display Price</label>
                    <input type="text" class="form-control" value="${{ "%.2f"|format(product.display_price) if product and product.display_price else '0.00' }}" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">Turn14 Stock</label>
                    <input type="number" name="turn14_stock" class="form-control" value="{{ product.turn14_stock if product else 0 }}">
                </div>
                <div class="form-check form-switch mb-3">
                    <input type="checkbox" name="in_stock" class="form-check-input" {{ 'checked' if product and product.in_stock else '' }}>
                    <label class="form-check-label">In Stock</label>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Length (in)</label>
                            <input type="number" step="0.01" name="length" class="form-control" value="{{ product.length if product and product.length else '' }}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Width (in)</label>
                            <input type="number" step="0.01" name="width" class="form-control" value="{{ product.width if product and product.width else '' }}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="mb-3">
                            <label class="form-label">Height (in)</label>
                            <input type="number" step="0.01" name="height" class="form-control" value="{{ product.height if product and product.height else '' }}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Weight</label>
                            <input type="number" step="0.01" name="weight" class="form-control" value="{{ product.weight if product and product.weight else '' }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label class="form-label">Weight Unit</label>
                            <select name="weight_unit" class="form-select">
                                <option value="lb" {{ 'selected' if not product or product.weight_unit == 'lb' else '' }}>lb</option>
                                <option value="kg" {{ 'selected' if product and product.weight_unit == 'kg' else '' }}>kg</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Image URL</label>
                    <input type="url" name="image_url" class="form-control" value="{{ product.image_url if product else '' }}">
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Fitment IDs (comma-separated)</label>
                    <textarea name="fitment_ids" class="form-control" rows="3">{{ product.fitment_ids if product else '' }}</textarea>
                </div>
                <div class="form-check form-switch mb-3">
                    <input type="checkbox" name="carb_compliant" class="form-check-input" {{ 'checked' if product and product.carb_compliant else '' }}>
                    <label class="form-check-label">CARB Compliant</label>
                </div>
                <div class="form-check form-switch mb-3">
                    <input type="checkbox" name="featured" class="form-check-input" {{ 'checked' if product and product.featured else '' }}>
                    <label class="form-check-label">Featured on Homepage</label>
                </div>
                <div class="mb-3">
                    <label class="form-label">Local Notes</label>
                    <textarea name="local_notes" class="form-control" rows="6">{{ product.local_notes if product else '' }}</textarea>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('admin.products') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
