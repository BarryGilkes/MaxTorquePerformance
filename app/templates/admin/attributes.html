{% extends 'base.html' %}
{% block title %}Attribute Visibility{% endblock %}
{% block content %}
<div class='container py-5'>
  <h1 class='mb-4'>Product Attribute Visibility</h1>
  <p class='text-muted'>Select which product attributes are displayed on the public product detail page.</p>
  
  <form id='visibility-form'>
    <div class='card' style='max-width: 600px;'>
      <div class='card-body p-3'>
        {% for setting in settings %}
          <div class='form-check form-switch mb-4'>
            <input class='form-check-input' type='checkbox' id='attr-{{ setting.attribute_name }}' name='{{ setting.attribute_name }}' {% if setting.is_visible %}checked{% endif %}>
            <label class='form-check-label' for='attr-{{ setting.attribute_name }}'>{{ setting.attribute_name|replace('_', ' ')|title }}</label>
          </div>
        {% endfor %}
      </div>
    </div>
    
    <div class='mt-3'>
      <button type='button' class='btn btn-primary' onclick='saveVisibility()'>Save Changes</button>
      <a href='{{ url_for('admin.dashboard') }}' class='btn btn-secondary'>Cancel</a>
    </div>
  </form>
</div>

<script>
function saveVisibility() {
  const form = document.getElementById('visibility-form');
  const updates = [];
  
  // Gather all checkbox states by selecting all inputs inside the form
  const checkboxes = form.querySelectorAll('input[type="checkbox"]');
  checkboxes.forEach(cb => {
    updates.push({ attribute_name: cb.name, is_visible: cb.checked });
  });
  
  console.log('Saving updates:', updates);
  
  fetch('{{ url_for('admin.api_attribute_visibility') }}', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ updates: updates })
  })
  .then(response => {
    console.log('Response status:', response.status);
    return response.json().catch(err => {
      console.error('JSON parse error:', err);
      return { success: false, error: 'Invalid JSON response' };
    });
  })
  .then(data => {
    console.log('Response data:', data);
    if (data.success) {
      alert('Visibility settings saved.');
    } else {
      alert('Error saving settings: ' + (data.error || 'Unknown error'));
    }
  })
  .catch(err => {
    console.error('Fetch error:', err);
    alert('Network error: ' + err.message);
  });
}
</script>
{% endblock %}
